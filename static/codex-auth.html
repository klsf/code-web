<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Code Web · ChatGPT 账户验证</title>
  <script src="/app-config.js?v=__ASSET_VERSION__"></script>
  <link rel="stylesheet" href="/codex-auth.css?v=__ASSET_VERSION__">
</head>
<body>
  <main class="auth-page">
    <section class="auth-card">
      <h1 class="auth-title">ChatGPT 账户验证</h1>
      <p class="auth-subtitle">按下面 3 步完成验证后，再回到 Code Web 继续使用。</p>

      <section class="auth-section">
        <div id="steps" class="auth-steps"></div>
      </section>

      <section class="auth-section">
        <label class="auth-label" for="callbackInput">回调链接</label>
        <textarea
          id="callbackInput"
          class="auth-input"
          placeholder="示例: http://localhost:1455/auth/callback?code=...&scope=...&state=..."
        ></textarea>
        <div class="auth-actions">
          <button id="completeAuth" class="auth-button" type="button">完成授权</button>
          <button id="backToApp" class="auth-button" type="button">返回 Code Web</button>
        </div>
      </section>
    </section>
  </main>
  <script src="/codex-auth.js?v=__ASSET_VERSION__"></script>
</body>
</html>
