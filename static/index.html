<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Code Web</title>
  <link rel="stylesheet" href="/style.css">
  <script src="/app-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
</head>
<body>
  <div id="errorToast" class="error-toast" hidden></div>
  <section id="loginScreen" class="login-screen" hidden>
    <form id="loginForm" class="login-card">
      <div class="login-title" data-app-title>Code Web</div>
      <div class="login-version" data-version>vdev</div>
      <input id="passwordInput" class="login-input" type="password" placeholder="请输入密码" autocomplete="current-password">
      <button id="loginButton" class="login-button" type="submit">登录</button>
      <div id="loginError" class="login-error"></div>
    </form>
  </section>

  <section id="sessionChooser" class="login-screen" hidden>
    <div class="login-card chooser-card">
      <div class="login-title" data-app-title>Code Web</div>
      <div class="login-version" data-version>vdev</div>
      <div class="provider-picker-wrap">
        <div class="provider-picker-label">选择工具</div>
        <div id="providerPickerChooser" class="provider-picker" role="radiogroup" aria-label="选择工具"></div>
      </div>
      <input id="workdirInput" class="login-input" type="text" placeholder="请输入工作目录，例如 H:\\go\\code-web-new">
      <div class="chooser-actions">
        <button id="newSessionChoice" class="login-button" type="button">新建会话</button>
        <button id="resumeSessionChoice" class="login-button login-button-secondary" type="button">恢复会话</button>
      </div>
      <div id="resumeEmpty" class="login-error" hidden>没有可恢复的历史会话</div>
    </div>
  </section>

  <section id="sessionModal" class="session-modal" hidden>
    <div class="session-modal-card">
      <div class="session-modal-head">
        <div class="session-modal-title">会话列表</div>
        <button id="sessionModalCloseBtn" class="session-modal-close" type="button" aria-label="关闭">×</button>
      </div>
      <div id="resumeList" class="resume-list"></div>
    </div>
  </section>

  <section id="actionModal" class="action-modal" hidden>
    <div class="action-modal-card">
      <div class="action-modal-head">
        <div class="action-modal-title">快捷操作</div>
        <button id="actionModalCloseBtn" class="session-modal-close" type="button" aria-label="关闭">×</button>
      </div>
      <div class="action-list">
        <button id="actionOpenSessionsBtn" class="action-item" type="button">
          <span class="action-item-title">会话列表</span>
          <span class="action-item-desc">查看、恢复或删除历史会话</span>
        </button>
        <button id="actionNewSessionBtn" class="action-item action-item-primary" type="button">
          <span class="action-item-title">新建会话</span>
          <span class="action-item-desc">返回新建页面并开始新的聊天</span>
        </button>
        <button id="actionLogoutBtn" class="action-item action-item-danger" type="button">
          <span class="action-item-title">退出登录</span>
          <span class="action-item-desc">清除当前登录状态并返回密码登录页</span>
        </button>
      </div>
    </div>
  </section>

  <div class="app-shell">
    <aside class="desktop-sidebar">
      <div class="sidebar-card">
        <div class="sidebar-title">状态</div>
        <div id="statusPanel" class="status-panel">
          <div class="status-row"><span class="status-key">工具</span><span id="statusProvider" class="status-value">-</span></div>
          <div class="status-row"><span class="status-key">会话</span><span id="statusSession" class="status-value">-</span></div>
          <div class="status-row"><span class="status-key">模型</span><span id="statusModel" class="status-value">unknown</span></div>
          <div class="status-row"><span class="status-key">目录</span><span id="statusCwd" class="status-value">/</span></div>
          <div class="status-row"><span class="status-key">状态</span><span id="statusTask" class="status-value">idle</span></div>
          <div class="status-row"><span class="status-key">连接</span><span id="statusTransport" class="status-value">connecting</span></div>
        </div>
      </div>
    </aside>

    <header class="desktop-topbar">
      <div class="topbar-actions">
        <button id="desktopMenuBtn" class="menu-btn" type="button" aria-label="打开菜单">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 7h14"></path>
            <path d="M5 12h14"></path>
            <path d="M5 17h14"></path>
          </svg>
        </button>
      </div>
      <div class="title-stack">
        <div class="page-title" data-app-title>Code Web</div>
        <div class="page-subtitle">
          <span class="desktop-session-badge" id="desktopSessionBadge">会话初始化中</span>
          <span class="subtitle-separator" aria-hidden="true">·</span>
          <span class="desktop-transport-badge" id="desktopTransportBadge">连接中</span>
          <span class="subtitle-separator" aria-hidden="true">·</span>
          <span class="page-version" data-version>vdev</span>
        </div>
      </div>
    </header>

    <main class="phone-shell">
      <header class="topbar">
        <div class="page-title" data-app-title>Code Web</div>
        <button id="menuBtn" class="menu-btn title-menu-btn" type="button" aria-label="打开菜单">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 7h14"></path>
            <path d="M5 12h14"></path>
            <path d="M5 17h14"></path>
          </svg>
        </button>
        <div class="page-subtitle">
          <span id="sessionBadge">会话初始化中</span>
          <span class="subtitle-separator" aria-hidden="true">·</span>
          <span id="transportBadge">连接中</span>
          <span class="subtitle-separator" aria-hidden="true">·</span>
          <span class="page-version" data-version>vdev</span>
        </div>
      </header>

      <section id="connectionBanner" class="connection-banner" hidden>
        <div class="connection-banner-head">
          <span id="connectionBadge" class="connection-badge">live</span>
          <span id="connectionTitle" class="connection-title">连接正常</span>
        </div>
        <div id="connectionDetail" class="connection-detail">实时事件会显示在这里。</div>
      </section>

      <section id="timeline" class="timeline" aria-live="polite"></section>

      <form id="composer" class="composer">
        <footer class="status-strip">
          <span id="footerState">ready</span>
          <span id="footerDetail">waiting for input</span>
          <label class="composer-select-wrap composer-select-inline" for="modelSelect">
            <span class="composer-select-label">模型</span>
            <select id="modelSelect" class="composer-select" aria-label="选择模型"></select>
          </label>
          <span id="modelBadge">unknown</span>
          <span id="cwdBadge">/</span>
        </footer>
        <section id="attachmentTray" class="attachment-tray"></section>
        <div class="composer-main">
          <textarea id="promptInput" rows="1" spellcheck="false" placeholder="发送消息，Shift + Enter 换行"></textarea>
          <input id="imageInput" type="file" accept="image/*" multiple hidden>
          <button class="round-icon round-icon-secondary" type="button" id="imageBtn" aria-label="上传图片">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="4.5" y="5.5" width="15" height="13" rx="2.5"></rect>
              <circle cx="9" cy="10" r="1.5"></circle>
              <path d="M7 16l3.2-3.2a1 1 0 0 1 1.4 0L13 14l1.7-1.7a1 1 0 0 1 1.4 0L17.5 14"></path>
            </svg>
          </button>
          <button class="round-icon" type="submit" id="sendBtn" aria-label="发送">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 5v11"></path>
              <path d="M8.5 9.5 12 5l3.5 4.5"></path>
            </svg>
          </button>
        </div>
      </form>
    </main>
  </div>

  <template id="messageTemplate">
    <article class="bubble-row">
      <div class="bubble-meta"></div>
      <div class="bubble"></div>
    </article>
  </template>

  <template id="attachmentTemplate">
    <article class="attachment-chip">
      <img class="attachment-thumb" alt="">
      <button class="attachment-remove" type="button">×</button>
    </article>
  </template>

  <script src="/app/state.js"></script>
  <script src="/app/render.js"></script>
  <script src="/app/runtime.js"></script>
  <script src="/app/bootstrap.js"></script>
</body>
</html>
